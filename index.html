<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Copa 2026</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --g:#006633;--y:#F4C10F;--b:#003F88;
  --bg:#060F1A;--card:#0D1E2C;--border:rgba(244,193,15,0.18);
  --text:#B8D0E2;--muted:#4A6A80;--green:#33CC77;--red:#FF4455;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;min-height:100vh;overflow-x:hidden}

.hero{background:linear-gradient(170deg,#001A0A 0%,#001030 55%,#060F1A 100%);padding:env(safe-area-inset-top,20px) 20px 24px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(244,193,15,0.12) 0%,transparent 70%);pointer-events:none}
.hero-ball{font-size:48px;line-height:1;margin-bottom:8px;display:inline-block;animation:spin 8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.hero h1{font-size:clamp(26px,7vw,38px);font-weight:800;color:#fff;line-height:1.05}
.hero h1 span{color:var(--y)}
.hero-sub{font-size:11px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-top:4px}
.hero-pills{display:flex;justify-content:center;gap:6px;margin-top:12px;flex-wrap:wrap}
.pill{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:4px 10px;font-size:11px;font-weight:600;color:#99BBCC}
.pill.br{background:rgba(0,102,51,0.25);border-color:rgba(0,102,51,0.5);color:var(--green)}

.tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;padding:13px 8px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;text-align:center;transition:color .2s,border-color .2s;user-select:none}
.tab.active{color:var(--y);border-bottom-color:var(--y)}

.section{display:none;padding:14px 14px 80px}
.section.active{display:block}

/* JOGO CARD */
.jogo{background:var(--card);border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:13px 14px;margin-bottom:9px}
.jogo.brasil{border-color:rgba(244,193,15,0.4);background:linear-gradient(135deg,rgba(0,102,51,0.18) 0%,var(--card) 100%)}
.jogo.vivo{border-color:rgba(255,68,85,0.45);background:linear-gradient(135deg,rgba(255,68,85,0.08) 0%,var(--card) 100%)}
.jogo.encerrado{opacity:0.85}

.jogo-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.jogo-grupo{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px}
.badge.enc{background:rgba(74,106,128,0.2);color:var(--muted)}
.badge.vivo{background:rgba(255,68,85,0.2);color:#FF4455}
.badge.prox{background:rgba(244,193,15,0.1);color:var(--y)}

.jogo-meio{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px;margin-bottom:8px}
.time{text-align:center}
.time-nome{font-size:13px;font-weight:700;color:#D0E8F5;line-height:1.2}
.time.br .time-nome{color:#FFE87C}
.placar-box{display:flex;align-items:center;gap:4px;justify-content:center}
.gol{font-size:26px;font-weight:900;color:#fff;line-height:1;min-width:24px;text-align:center}
.sep{font-size:14px;font-weight:600;color:var(--muted)}

.jogo-bot{display:flex;justify-content:space-between;align-items:center;padding-top:8px;border-top:1px solid rgba(255,255,255,0.05)}
.jogo-hora{font-size:12px;font-weight:600;color:var(--y)}
.jogo-local{font-size:11px;color:var(--muted)}

/* DIA */
.dia{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#5588BB;padding:16px 0 8px;display:flex;align-items:center;gap:8px}
.dia::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(85,136,187,0.3),transparent)}
.dia.hoje-label{color:var(--green)}
.dia.hoje-label::after{background:linear-gradient(90deg,rgba(51,204,119,0.3),transparent)}

/* RODADA */
.rodada{font-size:12px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--y);padding:18px 0 10px;border-bottom:1px solid var(--border);margin-bottom:10px}

/* GRUPOS */
.grupos-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.gcard{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:13px;position:relative;overflow:hidden}
.gcard.br{border-color:rgba(244,193,15,0.45);background:linear-gradient(135deg,rgba(0,100,50,0.15) 0%,var(--card) 60%)}
.gletter{position:absolute;top:-6px;right:8px;font-size:46px;font-weight:900;color:rgba(255,255,255,0.04);line-height:1;pointer-events:none}
.gtitle{font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--y);margin-bottom:9px}
.gteams{display:flex;flex-direction:column;gap:4px}
.grow{font-size:12px;font-weight:500;color:var(--text);display:flex;align-items:center;justify-content:space-between}
.grow.brow{color:var(--y);font-weight:700}
.grow.gray{color:var(--muted);font-size:11px;font-style:italic}
.gleft{display:flex;align-items:center;gap:5px}
.gdot{width:5px;height:5px;border-radius:50%;background:var(--g);flex-shrink:0}
.brow .gdot{background:var(--y)}
.gray .gdot{background:var(--muted)}
.gpts{font-size:11px;font-weight:700;color:var(--muted)}
.gpts.top{color:var(--green)}

/* BRASIL */
.br-hero{background:linear-gradient(135deg,rgba(0,102,51,0.3) 0%,rgba(0,63,136,0.3) 100%);border:1px solid rgba(244,193,15,0.3);border-radius:18px;padding:18px;text-align:center;margin-bottom:14px}
.br-flag{font-size:42px;margin-bottom:6px}
.br-hero h2{font-size:20px;font-weight:800;color:var(--y)}
.br-hero p{font-size:12px;color:var(--text);margin-top:3px}

/* FILTROS */
.filtros{display:flex;gap:7px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none}
.filtros::-webkit-scrollbar{display:none}
.fbtn{flex:none;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
.fbtn.on{background:var(--y);border-color:var(--y);color:#060F1A}

.vivo-pulse{animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
</style>
</head>

  const dias=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const meses=['Jan','Fev','Mar','Abr','Mai','Jun','Jul'];
  return `${dias[dt.getDay()]}, ${dt.getDate()} ${meses[dt.getMonth()]}`;
}

function isHoje(d){ return d === hoje(); }

function jogoCard(j){
  const enc = j.st==='enc';
  const vivo = j.st==='vivo';
  const temPlacar = enc || vivo;
  const br = j.br || j.casa==='Brasil' || j.fora==='Brasil';

  let badge = '';
  if(enc) badge = '<span class="badge enc">Encerrado</span>';
  else if(vivo) badge = '<span class="badge vivo vivo-pulse">🔴 Ao vivo</span>';
  else badge = `<span class="badge prox">${j.h}</span>`;

  const brCasa = j.casa==='Brasil';
  const brFora = j.fora==='Brasil';

  return `<div class="jogo ${br?'brasil':''} ${enc?'encerrado':''} ${vivo?'vivo':''}">
    <div class="jogo-top">
      <span class="jogo-grupo">${j.grupo}</span>
      ${badge}
    </div>
    <div class="jogo-meio">
      <div class="time ${brCasa?'br':''}">
        <div class="time-nome">${brCasa?'🇧🇷 ':''}${j.casa}</div>
      </div>
      <div class="placar-box">
        ${temPlacar
          ? `<span class="gol">${j.gh}</span><span class="sep">–</span><span class="gol">${j.ga}</span>`
          : `<span class="sep" style="font-size:18px;color:var(--muted)">×</span>`
        }
      </div>
      <div class="time ${brFora?'br':''}">
        <div class="time-nome">${brFora?'🇧🇷 ':''}${j.fora}</div>
      </div>
    </div>
    <div class="jogo-bot">
      <span class="jogo-hora">⏰ ${j.h} • Brasília</span>
      <span class="jogo-local">📍 ${j.local}</span>
    </div>
  </div>`;
}

function renderPorDia(lista){
  if(!lista.length) return '<p style="color:var(--muted);text-align:center;padding:30px">Nenhum jogo encontrado</p>';
  const map={};
  lista.forEach(j=>{ if(!map[j.d]) map[j.d]=[]; map[j.d].push(j); });
  let html='';
  Object.keys(map).sort().forEach(d=>{
    const isH = isHoje(d);
    html += `<div class="dia ${isH?'hoje-label':''}">${isH?'🟢 Hoje — ':''}${formatDia(d)}</div>`;
    map[d].forEach(j=>{ html += jogoCard(j); });
  });
  return html;
}

// Renderiza Brasil
function renderBrasil(){
  const jogos = JOGOS.filter(j=>j.br);
  document.getElementById('br-jogos').innerHTML = renderPorDia(jogos);
}

// Renderiza Hoje
function renderHoje(){
  const h = hoje();
  const jogos = JOGOS.filter(j=>j.d===h);
  const el = document.getElementById('hoje-jogos');
  if(!jogos.length){
    // mostra próximos
    const prox = JOGOS.filter(j=>j.d>h).slice(0,8);
    el.innerHTML = '<div class="dia">Próximos jogos</div>' + prox.map(jogoCard).join('');
  } else {
    el.innerHTML = renderPorDia(jogos);
  }
}

// Renderiza Grupos
function renderGrupos(){
  let html = '<div class="grupos-grid">';
  GRUPOS.forEach(g=>{
    const temBr = g.times.some(t=>t.br);
    html += `<div class="gcard ${temBr?'br':''}">
      <div class="gletter">${g.letra}</div>
      <div class="gtitle">Grupo ${g.letra}${temBr?' 🏆':''}</div>
      <div class="gteams">`;
    g.times.forEach((t,i)=>{
      html += `<div class="grow ${t.br?'brow':''} ${t.n.includes('*')?'gray':''}">
        <div class="gleft"><span class="gdot"></span>${t.br?'🇧🇷 ':''}<b>${t.n}</b></div>
        <span class="gpts ${i<2&&t.j>0?'top':''}">${t.j>0?t.pts+'pts':''}</span>
      </div>`;
    });
    html += `</div></div>`;
  });
  html += '</div>';
  document.getElementById('grupos-content').innerHTML = html;
}

// Renderiza Todos
let filtroAtual = 'todos';
function renderTodos(f){
  filtroAtual = f||filtroAtual;
  let lista = JOGOS;
  if(filtroAtual==='brasil') lista = JOGOS.filter(j=>j.br);
  else if(filtroAtual==='r1') lista = JOGOS.filter(j=>j.r==='r1');
  else if(filtroAtual==='r2') lista = JOGOS.filter(j=>j.r==='r2');
  else if(filtroAtual==='r3') lista = JOGOS.filter(j=>j.r==='r3');

  let html='';
  if(filtroAtual==='todos'){
    const rodadas = ['r1','r2','r3'];
    const nomes = {'r1':'1ª Rodada','r2':'2ª Rodada','r3':'3ª Rodada'};
    rodadas.forEach(r=>{
      const sub = JOGOS.filter(j=>j.r===r);
      if(!sub.length) return;
      html += `<div class="rodada">${nomes[r]}</div>`;
      html += renderPorDia(sub);
    });
  } else {
    html = renderPorDia(lista);
  }
  document.getElementById('todos-jogos').innerHTML = html;
}

function filtrar(f, btn){
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderTodos(f);
}

function showTab(id, el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(id).classList.add('active');
}

// Init
renderBrasil();
renderHoje();
renderGrupos();
renderTodos('todos');
</script>
</body>
</html>
